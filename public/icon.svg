<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1625" />
      <stop offset="100%" stop-color="#0f0d15" />
    </linearGradient>
    
    <!-- Accent Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8b98a" />
      <stop offset="50%" stop-color="#c8956c" />
      <stop offset="100%" stop-color="#d4a857" />
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Base (Maskable Safe Area) -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" stroke="#2e2942" stroke-width="8" />

  <!-- Outer Golden Ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#goldGrad)" stroke-width="4" stroke-opacity="0.3" stroke-dasharray="10 15" />

  <!-- Stylized Coffee Cup Logo -->
  <g transform="translate(136, 126)" filter="url(#glow)">
    <!-- Steam Lines -->
    <path d="M 90,40 Q 80,20 100,0" fill="none" stroke="url(#goldGrad)" stroke-width="8" stroke-linecap="round" />
    <path d="M 120,45 Q 110,20 130,0" fill="none" stroke="url(#goldGrad)" stroke-width="8" stroke-linecap="round" />
    <path d="M 150,40 Q 140,20 160,0" fill="none" stroke="url(#goldGrad)" stroke-width="8" stroke-linecap="round" />

    <!-- Cup Body -->
    <path d="M 40,70 L 200,70 C 200,160 160,200 120,200 C 80,200 40,160 40,70 Z" fill="url(#goldGrad)" />

    <!-- Cup Handle -->
    <path d="M 200,100 C 230,100 240,140 200,150" fill="none" stroke="url(#goldGrad)" stroke-width="12" stroke-linecap="round" />

    <!-- Coffee Plate / Saucer -->
    <path d="M 10,215 L 230,215 C 230,225 210,235 120,235 C 30,235 10,225 10,215 Z" fill="url(#goldGrad)" opacity="0.9" />
  </g>

  <!-- Decorative Inner Text USFX / IND210 -->
  <text x="256" y="440" fill="#a39eb8" font-family="'Inter', sans-serif" font-size="18" font-weight="700" letter-spacing="4" text-anchor="middle" opacity="0.6">
    CHARCAS CAPITAL
  </text>
</svg>
